kind = "web"
previewPath = "/"
title = "SyncBoard — Live Collab"
version = "1.0.0"
id = "artifacts/syncboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22493

[services.development]
run = "pnpm --filter @workspace/syncboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/syncboard", "run", "build" ]
publicDir = "artifacts/syncboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22493"
BASE_PATH = "/"
